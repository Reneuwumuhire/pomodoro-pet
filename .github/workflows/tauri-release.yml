name: tauri-windows

# Builds the Windows installers (x64 + ARM64) on real Windows runners and uploads
# them as workflow artifacts. They're then attached to the release manually
# (`gh release upload`) so the published release notes/assets aren't clobbered.
#
# Run:  gh workflow run tauri-windows --ref main -f ref=v2.0.0
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'git ref (tag/branch) to build'
        default: v2.0.0
        required: true

jobs:
  windows:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: windows-11-arm
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - name: Build Windows bundle
        run: pnpm tauri build --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: petomato-windows-${{ matrix.target }}
          if-no-files-found: error
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*-setup.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
