name: release

# Push a version tag (e.g. `v2.1.0`) and this builds, signs, and publishes the
# GitHub Release for macOS + Windows — including the updater artifacts and the
# `latest.json` manifest that the in-app auto-updater reads. See RELEASING.md.
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      # Serialized: multiple jobs merge into the same latest.json, and concurrent
      # merges can clobber each other's platform entry. One at a time = correct
      # manifest (slower wall-clock, but a release runs rarely).
      max-parallel: 1
      matrix:
        include:
          # Universal DMG (both chips) for manual download by users who aren't sure
          # which Mac they have. Excluded from latest.json (updaterJson: false) so it
          # doesn't overwrite the darwin entries — auto-update uses the smaller
          # per-arch artifacts below. Unsigned until APPLE_* secrets exist.
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
            updaterJson: false
          # Apple Silicon — ~half the size; owns darwin-aarch64 in latest.json.
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust-targets: 'aarch64-apple-darwin'
            updaterJson: true
          # Intel — ~half the size; owns darwin-x86_64 in latest.json.
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust-targets: 'x86_64-apple-darwin'
            updaterJson: true
          - platform: windows-latest
            args: ''
            rust-targets: ''
            updaterJson: true
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build, sign, and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — must match the pubkey in tauri.conf.json.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple code signing + notarization (macOS only). LEAVE COMMENTED until you
          # have a Developer ID Application cert + secrets: an EMPTY APPLE_SIGNING_IDENTITY
          # makes Tauri attempt (and fail) to sign with no certificate. Uncomment all
          # six once the APPLE_* repo secrets exist — see RELEASING.md.
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Petomato ${{ github.ref_name }}'
          releaseBody: 'Automated release. The app auto-updates itself from here; assets below are for fresh installs.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          # Per-job: the universal mac build is excluded so auto-update serves the
          # smaller per-arch artifacts. tauri-action merges latest.json across jobs.
          includeUpdaterJson: ${{ matrix.updaterJson }}
